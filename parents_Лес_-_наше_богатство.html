<!doctype html><html lang="ru"><head><meta charset="utf-8">
<title>Лес - наше богатство</title>
<style>
.gallery{display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:12px}
.gallery img{width:100%;height:170px;object-fit:cover;border-radius:8px;cursor:pointer}
#lb{display:none;position:fixed;inset:0;background:rgba(0,0,0,.92);align-items:center;justify-content:center;flex-direction:column}
#lb img{max-width:95vw;max-height:88vh}
.ctrl{margin-top:12px;color:#fff}
.ctrl button{padding:8px 14px;margin:0 6px}
</style>

<script>
let gallery=[],cur=0;
function openLB(i){
 gallery=[...document.querySelectorAll('.gallery img')];
 if(!gallery.length)return;
 cur=i;show();document.getElementById('lb').style.display='flex';
}
function show(){
 document.getElementById('lbimg').src=gallery[cur].src;
 document.getElementById('count').textContent=(cur+1)+' / '+gallery.length;
}
function next(){cur=(cur+1)%gallery.length;show();}
function prev(){cur=(cur-1+gallery.length)%gallery.length;show();}
document.addEventListener('keydown',e=>{
 const lb=document.getElementById('lb');
 if(lb.style.display!='flex')return;
 if(e.key==='Escape')lb.style.display='none';
 if(e.key==='ArrowRight')next();
 if(e.key==='ArrowLeft')prev();
});
</script></head>
<body>
<header style="background:#1f6f64;color:#fff;padding:18px"><a href="parents.html" style="color:#fff;text-decoration:none">← Работа с родителями</a></header>
<main style="max-width:1100px;margin:auto;padding:24px;font-family:Arial">
<h1>Лес - наше богатство</h1>
<div class="gallery"><img src="materials/Приложения/Работа с родителями/Лес - наше богатство/2.jpg" data-i="0" onclick="openLB(0)"><img src="materials/Приложения/Работа с родителями/Лес - наше богатство/3.jpg" data-i="1" onclick="openLB(1)"><img src="materials/Приложения/Работа с родителями/Лес - наше богатство/4.jpg" data-i="2" onclick="openLB(2)"><img src="materials/Приложения/Работа с родителями/Лес - наше богатство/5.jpg" data-i="3" onclick="openLB(3)"><img src="materials/Приложения/Работа с родителями/Лес - наше богатство/Лес наше богатство.jpg" data-i="4" onclick="openLB(4)"></div>
<h2>Документы</h2>
<ul></ul>
</main>
<div id="lb" onclick="this.style.display='none'">
<img id="lbimg">
<div class="ctrl" onclick="event.stopPropagation()">
<button onclick="prev()">◀</button>
<span id="count"></span>
<button onclick="next()">▶</button>
</div>
</div>
</body></html>
